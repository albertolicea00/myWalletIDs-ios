name: MyWalletIDs

options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  MyWalletIDs:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MyWalletIDs
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.albertolicea.mywalletids
        PRODUCT_NAME: MyWalletIDs
        INFOPLIST_FILE: MyWalletIDs/App/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: YES

schemes:
  MyWalletIDs:
    build:
      targets:
        MyWalletIDs: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
