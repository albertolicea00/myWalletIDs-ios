name: Bug report
description: Something in the app does not work as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in as much detail as you can.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: The card flip animation shows a blank face when...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Create a credit card with a CVV field
        2. Open the card detail
        3. Tap the card to flip it
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The back face should show the sensitive fields.
    validations:
      required: true
  - type: input
    id: ios-version
    attributes:
      label: iOS version
      placeholder: "17.5"
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: iPhone 15 Pro / iPhone 15 simulator
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, screen recordings, crash logs...
    validations:
      required: false
